name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check paperpilot/ --ignore E501,E402,F401,F811

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest rapidfuzz pyyaml pydantic httpx openpyxl
      - name: Run tests
        run: pytest tests/ -v --tb=short -k "not ui and not PySide" || true
        env:
          PYTHONPATH: .
